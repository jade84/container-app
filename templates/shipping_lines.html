<h2>Shipping Lines</h2>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form method="POST">
    Code: <input name="code">
    Name: <input name="name">
    <button type="submit">Thêm</button>
</form>

<br>

<table border="1">
<tr>
    <th>Code</th>
    <th>Name</th>
    <th>Action</th>
</tr>

{% for l in lines %}
<tr>
    <td>{{ l.code }}</td>
    <td>{{ l.name }}</td>
    <td>
        <a href="/shipping_lines/edit/{{ l.code }}">Sửa</a>
        |
        <a href="/shipping_lines/delete/{{ l.code }}"
           onclick="return confirm('Xóa?')">Xóa</a>
    </td>
</tr>
{% endfor %}
</table>
